<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Segoe UI,Arial;
margin:0;
background:#f3f5f7;
}

.header{
background:#015eab;
color:white;
padding:18px;
font-size:20px;
font-weight:600;
text-align:center;
}

.tabs{
display:flex;
}

.tab{
flex:1;
text-align:center;
padding:14px;
background:#d3d7dd;
cursor:pointer;
transition:0.2s;
}

.tab.active{
background:#00713d;
color:white;
font-weight:600;
}

.tab:hover{
background:#c7ccd3;
}

.wrapper{
display:flex;
justify-content:center;
padding:30px 10px;
}

.card{
width:100%;
max-width:520px;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 8px 24px rgba(0,0,0,0.08);
box-sizing:border-box;
}

label{
font-weight:600;
display:block;
margin-top:14px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
box-sizing:border-box;
}

button{

width:100%;
margin-top:22px;
padding:14px;
border:none;
border-radius:10px;
background:#015eab;
color:white;
font-size:16px;
cursor:pointer;

}

button:disabled{

background:#999;
cursor:not-allowed;

}

.msg{

margin-top:15px;
font-weight:600;

}

.success{color:green;}
.error{color:red;}

@media(max-width:600px){

.card{
padding:22px;
}

input,select,button{
font-size:16px;
}

.header{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="header">
EDI / PO System
</div>

<div class="tabs">

<div class="tab active" onclick="switchTab('log')">
Log DC
</div>

<div class="tab" onclick="switchTab('close')">
Close DC
</div>

</div>

<div class="wrapper">

<div class="card" id="logCard">

<label>Plant</label>
<select id="plant">
<option value="">--Select--</option>
<option>Chakan</option>
<option>Pune</option>
</select>

<label>Type</label>
<select id="type">
<option value="">--Select--</option>
<option>Without EDI</option>
<option>Inward DC</option>
</select>

<label>Vendor</label>
<input list="vendorList" id="vendor">
<datalist id="vendorList"></datalist>

<label>DC No</label>
<input type="number" id="dc" inputmode="numeric" pattern="[0-9]*">

<label>Part No</label>
<input list="partList" id="part" inputmode="numeric" pattern="[0-9]*">
<datalist id="partList"></datalist>

<label>Qty</label>
<input type="number" id="qty">

<label>Dock</label>
<select id="dock">
<option value="">--Select--</option>
<option>1</option>
<option>2</option>
<option>3</option>
</select>

<label>Remark</label>
<input id="remark" type="text">

<button id="saveBtn" onclick="save()">Save</button>

<div id="msg" class="msg"></div>

</div>

<div class="card" id="closeCard" style="display:none">

<label>Type</label>
<select id="closeType" onchange="toggleCloseFields()">
<option value="">--Select--</option>
<option>Without EDI</option>
<option>Inward DC</option>
</select>

<label>DC No</label>
<input id="closeDC" list="openDC">
<datalist id="openDC"></datalist>

<div id="ediField">
<label>EDI No</label>
<input id="edi" type="number">
</div>

<div id="invoiceField" style="display:none">
<label>Invoice No</label>
<input id="invoice" type="number">
</div>

<button id="closeBtn" onclick="closeEntry()">Close</button>

<div id="msg2" class="msg"></div>

</div>

</div>

<script>

/* TAB SWITCH */

function switchTab(tab){

const logTab = document.querySelectorAll(".tab")[0];
const closeTab = document.querySelectorAll(".tab")[1];

if(tab=="log"){

document.getElementById("logCard").style.display="block";
document.getElementById("closeCard").style.display="none";

logTab.classList.add("active");
closeTab.classList.remove("active");

}else{

document.getElementById("logCard").style.display="none";
document.getElementById("closeCard").style.display="block";

closeTab.classList.add("active");
logTab.classList.remove("active");

}

}

/* LOAD DATA */

window.onload=function(){

google.script.run.withSuccessHandler(function(v){

const list=document.getElementById("vendorList");

v.forEach(i=>{
let o=document.createElement("option");
o.value=i;
list.appendChild(o);
});

}).getVendors();


google.script.run.withSuccessHandler(function(p){

const list=document.getElementById("partList");

p.forEach(i=>{
let o=document.createElement("option");
o.value=i;
list.appendChild(o);
});

}).getParts();


google.script.run.withSuccessHandler(function(d){

const list=document.getElementById("openDC");

d.forEach(i=>{
let o=document.createElement("option");
o.value=i;
list.appendChild(o);
});

}).getOpenDC();

}

/* SAVE ENTRY */

function save(){

const btn=document.getElementById("saveBtn");
btn.disabled=true;
btn.innerText="Saving...";

if(!plant.value || !type.value || !vendor.value || !dc.value){
msg.innerHTML="Please fill required fields";
msg.className="msg error";
btn.disabled=false;
btn.innerText="Save";
return;
}


const data={

plant:plant.value,
type:type.value,
vendor:vendor.value,
dc:dc.value,
part:part.value,
qty:qty.value,
dock:dock.value,
remark:remark.value

};

google.script.run
.withSuccessHandler(function(res){

btn.disabled=false;
btn.innerText="Save";

if(res.status){

msg.innerHTML="Saved Successfully";
clearForm();
msg.className="msg success";

}

else{

msg.innerHTML=res.msg;
msg.className="msg error";

}

})
.saveEntry(data);

}

function clearForm(){

plant.value="";
type.value="";
vendor.value="";
dc.value="";
part.value="";
qty.value="";
dock.value="";
remark.value="";

}

/* CLOSE */

function closeEntry(){

const btn=document.getElementById("closeBtn");
btn.disabled=true;
btn.innerText="Closing...";

const data={

type:closeType.value,
dc:closeDC.value,
edi:edi.value,
invoice:invoice.value

};

google.script.run
.withSuccessHandler(function(res){

btn.disabled=false;
btn.innerText="Close";

if(res.status){

msg2.innerHTML="Closed Successfully";
msg2.className="msg success";

}

else{

msg2.innerHTML=res.msg;
msg2.className="msg error";

}

})
.closeDC(data);

}


/* CLOSE TOGGLE */

function toggleCloseFields(){

const type = document.getElementById("closeType").value;

if(type=="Without EDI"){

ediField.style.display="block";
invoiceField.style.display="none";

}else{

ediField.style.display="none";
invoiceField.style.display="block";

}

}
</script>

</body>
</html>
